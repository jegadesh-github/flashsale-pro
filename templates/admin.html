<!DOCTYPE html>
<html>
<head>
    <title>Admin - Add Deal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">
    <div class="container" style="max-width: 600px;">
        <h2>Add New Flash Sale</h2>
        <form method="POST">
            <input type="text" name="product_name" class="form-control mb-2" placeholder="Product Name" required>
            <input type="number" step="0.01" name="original_price" class="form-control mb-2" placeholder="Original Price" required>
            <input type="number" step="0.01" name="sale_price" class="form-control mb-2" placeholder="Sale Price" required>
            <input type="text" name="affiliate_url" class="form-control mb-2" placeholder="Affiliate Link" required>
            <input type="text" name="image_url" class="form-control mb-2" placeholder="Image URL" required>
            <input type="datetime-local" name="expiry_time" class="form-control mb-2" required>
            <button type="submit" class="btn btn-success w-100">Publish Deal 🚀</button>
        </form>
    </div>
</body>
</html>
